spring:
  application:
    name: payflow
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    open-in-view: false
  rabbitmq:
    listener:
      simple:
        observation-enabled: false
    template:
      observation-enabled: false
  # Database and RabbitMQ will be configured by Testcontainers via @ServiceConnection

management:
  tracing:
    enabled: false

resilience4j:
  circuitbreaker:
    circuitBreakerAspectOrder: 1
    instances:
      paymentGateway:
        registerHealthIndicator: true
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 5s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        recordExceptions:
          - com.gozzerks.payflow.exception.PaymentGatewayException
        ignoreExceptions:
          - java.lang.IllegalArgumentException